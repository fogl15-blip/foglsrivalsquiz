<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QuizBuzz – Spieler</title>
<link rel="stylesheet" href="shared.css">
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<style>
html { height: 100%; }
body {
  min-height: 100%;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  /* Safe area for notch/home-bar on iOS/Android */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Screens ── */
.screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.screen.hidden { display: none; }

/* ── Select Screen ── */
#select-screen {
  align-items: center; justify-content: center;
  padding: 32px 24px 40px;
  gap: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: radial-gradient(ellipse at 50% -10%, rgba(91,110,245,0.15) 0%, transparent 60%),
              var(--bg);
}
.select-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 2.2rem; font-weight: 700;
  margin-bottom: 4px;
}
.select-subtitle {
  color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; text-align: center;
}
.slot-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; width: 100%; max-width: 380px;
}
.slot-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px; padding: 20px 16px;
  cursor: pointer; text-align: center;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.slot-card::before {
  content: ''; position: absolute; left: 0; top: 0; right: 0; height: 3px;
  background: var(--pc);
}
.slot-card:hover { border-color: var(--pc); box-shadow: 0 4px 20px -4px var(--pc); transform: translateY(-2px); }
.slot-card:active { transform: scale(0.97); }
.slot-card.taken { opacity: 0.5; cursor: not-allowed; }
.slot-card.taken:hover { transform: none; box-shadow: none; border-color: var(--border); }

.slot-icon { font-size: 2.2rem; margin-bottom: 8px; }
.slot-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.2rem; font-weight: 700; color: var(--pc);
  margin-bottom: 4px;
}
.slot-score {
  font-size: 0.75rem; color: var(--muted);
}
.slot-taken-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.1); border-radius: 20px;
  font-size: 0.62rem; padding: 2px 8px; color: var(--muted);
  font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
}
.waiting-msg {
  margin-top: 20px; color: var(--muted); font-size: 0.78rem; text-align: center;
}

/* ── Game Screen ── */
#game-screen {
  background: radial-gradient(ellipse at 50% -20%, color-mix(in srgb, var(--pc,#5b6ef5) 20%, transparent) 0%, transparent 50%),
              var(--bg);
  position: relative;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.game-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  padding-top: max(14px, env(safe-area-inset-top, 14px));
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
}
.game-header .player-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border-radius: 20px;
  padding: 6px 14px 6px 10px;
  border: 1px solid var(--border);
}
.game-header .player-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pc); }
.game-header .player-name { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; }
.score-pill {
  background: var(--surface); border-radius: 20px;
  padding: 6px 16px; border: 1px solid var(--border);
  font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700;
  color: var(--pc);
}
.game-header .spacer { flex: 1; }
.leave-btn {
  background: transparent; border: none; color: var(--muted);
  font-size: 0.8rem; cursor: pointer; padding: 6px 10px; border-radius: 6px;
  transition: color 0.2s;
}
.leave-btn:hover { color: var(--text); }

/* Question display */
.q-display {
  padding: 20px 20px 16px;
  border-bottom: 2px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
  background: linear-gradient(180deg, rgba(91,110,245,0.06) 0%, transparent 100%);
}
.q-phase-hint {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--pc, #5b6ef5);
  text-align: center;
}
.q-text-player {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.55rem; font-weight: 600; line-height: 1.35;
  color: #fff; text-align: center;
}
.q-media-player {
  width: 100%; border-radius: 10px;
  border: 1px solid var(--border);
}
.q-image-player {
  width: 100%; max-height: 340px;
  object-fit: contain; border-radius: 10px;
  border: 1px solid var(--border);
  display: block;
}

/* On desktop: question image + reveal image side by side */
.q-media-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-top: 6px;
  width: 100%;
}
.q-media-col {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.q-media-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}
.q-media-col .q-image-player {
  width: 100%;
  max-height: 420px;
}
@media (max-width: 600px) {
  .q-media-row { flex-direction: column; }
  .q-image-player { max-height: 240px; }
}
.q-reveal-box {
  background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.35);
  border-radius: 10px; padding: 12px 16px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.15rem; font-weight: 700; color: #22c55e;
  text-align: center;
}

/* Buzz area */
.buzz-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px 36px;
  gap: 18px;
}

.buzzer-btn {
  width: 200px; height: 200px; border-radius: 50%;
  border: none; cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.8rem; font-weight: 700; letter-spacing: 0.04em;
  color: #fff; background: var(--pc, #5b6ef5);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  position: relative; overflow: hidden;
  transition: transform 0.15s, filter 0.15s;
  box-shadow: 0 8px 40px -8px var(--pc, #5b6ef5),
              inset 0 -6px 0 rgba(0,0,0,0.2);
  -webkit-tap-highlight-color: transparent;
}
.buzzer-btn::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.28), transparent 60%);
  pointer-events: none;
}
.buzzer-btn:not(.locked):not(.already):active {
  transform: scale(0.91);
  filter: brightness(1.2);
  box-shadow: 0 4px 20px -4px var(--pc, #5b6ef5);
}
.buzzer-btn .b-icon { font-size: 2.6rem; }
.buzzer-btn .b-label { font-size: 1.1rem; letter-spacing: 0.1em; }
.buzzer-btn.locked { filter: grayscale(0.8) brightness(0.45); cursor: not-allowed; }
.buzzer-btn.already { filter: brightness(0.6); cursor: default; }
.buzzer-btn.fired { animation: buzzFire 0.45s ease; }
@keyframes buzzFire {
  0%{transform:scale(1)} 25%{transform:scale(1.09)} 60%{transform:scale(0.96)} 100%{transform:scale(1)}
}

.ripple {
  position: absolute; border-radius: 50%; pointer-events: none;
  background: rgba(255,255,255,0.25); transform: scale(0);
  animation: rippleOut 0.6s linear forwards;
}
@keyframes rippleOut { to { transform: scale(4.5); opacity: 0; } }

.buzz-status {
  font-size: 0.85rem; text-align: center; min-height: 40px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
}
.buzz-status.active { color: #22c55e; font-weight: 600; }
.buzz-status.warn   { color: #ef4444; }

.answer-area {
  width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 8px;
  padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
}
.answer-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 12px; padding: 13px 16px;
  font-family: 'Inter', sans-serif; font-size: 1rem; outline: none;
  text-align: center; transition: border-color 0.2s;
}
.answer-input:focus { border-color: var(--pc, #5b6ef5); }
.answer-input::placeholder { color: var(--muted); }

/* Name modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 24px; width: 90%; max-width: 380px;
}
.modal-header { margin-bottom: 16px; }
</style>
</head>
<body>

<!-- ── SELECT SCREEN ── -->
<div class="screen" id="select-screen">
  <div class="select-logo gradient-text">⚡ QuizBuzz</div>
  <div class="select-subtitle">Wähle deinen Spieler-Slot</div>
  <div class="slot-grid" id="slot-grid">
    <div style="color:var(--muted);grid-column:span 2;text-align:center;padding:20px;">
      Verbinde …
    </div>
  </div>
  <div class="waiting-msg">Der Host startet die Session.</div>
</div>

<!-- ── NAME MODAL ── -->
<div class="modal-backdrop" id="name-modal">
  <div class="modal" style="max-width:340px;">
    <div class="modal-header">
      <h2 style="font-size:1.1rem;">Dein Name</h2>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <p style="font-size:0.85rem;color:var(--muted);">Wie soll dein Name angezeigt werden?</p>
      <input class="input" id="name-input" placeholder="Dein Name …" maxlength="16"
        style="font-size:1.1rem;text-align:center;">
      <button class="btn lg w-full" id="name-confirm-btn" onclick="confirmName()">Los geht's ⚡</button>
    </div>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div class="screen hidden" id="game-screen">
  <div id="debug-bar" style="display:none;background:#1a1a2e;border-bottom:1px solid #333;padding:6px 12px;font-size:0.7rem;color:#aaa;font-family:monospace;word-break:break-all;"></div>
  <div class="game-header" id="game-header">
    <div class="player-pill">
      <div class="player-dot"></div>
      <span class="player-name" id="gh-name">–</span>
    </div>
    <div class="spacer"></div>
    <div class="score-pill" id="gh-score">0</div>
    <button class="leave-btn" onclick="leaveSlot()">✕ Verlassen</button>
  </div>

  <div class="q-display" id="q-display" style="display:none;"></div>

  <div class="buzz-area">
    <button class="buzzer-btn" id="buzz-btn" onclick="doBuzz(event)">
      <span class="b-icon">⚡</span>
      <span class="b-label">BUZZ!</span>
    </button>

    <div class="buzz-status" id="buzz-status">Bereit – warte auf den Host.</div>

    <div class="answer-area">
      <input class="answer-input" id="answer-input"
        placeholder="Antwort eingeben …"
        oninput="submitAnswer(this.value)">
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
initFirebase();

const SLOT_ICONS = ['🦊','🐺','🦁','🐉'];
let mySlot = null;
let session = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('name-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmName();
  });
});

// ─── Firebase ───────────────────────────────────────────
on('session', data => {
  session = data;
  if (!mySlot) renderSelectScreen();
  else         renderGameScreen();
});

// ─── Select Screen ──────────────────────────────────────
function renderSelectScreen() {
  const grid = document.getElementById('slot-grid');
  if (!session) {
    grid.innerHTML = `<div style="color:var(--muted);grid-column:span 2;text-align:center;padding:20px;font-size:0.85rem;">
      Warte auf Host …<br><span style="font-size:0.75rem;">Session noch nicht gestartet.</span>
    </div>`;
    return;
  }
  const players = session.players || {};
  grid.innerHTML = ['p1','p2','p3','p4'].map((pid, i) => {
    const p = players[pid];
    const taken = p?.connected && p?.connectedBy && p.connectedBy !== getDeviceId();
    return `
    <div class="slot-card ${taken?'taken':''}" style="--pc:${esc(p?.color||PLAYER_COLORS[i])};"
         onclick="${taken?'':'selectSlot(\''+pid+'\')'}">
      ${taken ? '<div class="slot-taken-badge">Belegt</div>' : ''}
      <div class="slot-icon">${SLOT_ICONS[i]}</div>
      <div class="slot-name">${esc(p?.name||'Spieler '+(i+1))}</div>
      <div class="slot-score">${p?.score||0} Punkte</div>
    </div>`;
  }).join('');
}

function getDeviceId() {
  let id = sessionStorage.getItem('qbz_device');
  if (!id) { id = Math.random().toString(36).slice(2); sessionStorage.setItem('qbz_device', id); }
  return id;
}

let pendingSlot = null;

function selectSlot(pid) {
  pendingSlot = pid;
  const p = session?.players?.[pid];
  const modal = document.getElementById('name-modal');
  const input = document.getElementById('name-input');
  // Pre-fill with existing name if not default
  const existingName = p?.name || '';
  const isDefault = existingName.match(/^Spieler [1-4]$/);
  input.value = isDefault ? '' : existingName;
  // Color the confirm button
  const color = p?.color || PLAYER_COLORS[parseInt(pid[1])-1];
  document.getElementById('name-confirm-btn').style.background = color;
  modal.classList.add('open');
  setTimeout(() => input.focus(), 100);
}

async function confirmName() {
  const pid = pendingSlot;
  if (!pid) return;
  const nameVal = document.getElementById('name-input').value.trim();
  const name = nameVal || (session?.players?.[pid]?.name || 'Spieler ' + pid[1]);
  document.getElementById('name-modal').classList.remove('open');

  mySlot = pid;
  const p = session?.players?.[pid];
  await update(`session/players/${pid}`, { connected: true, connectedBy: getDeviceId(), name });

  // Set up presence
  const presRef = firebase.database().ref(`session/players/${pid}/connected`);
  firebase.database().ref('.info/connected').on('value', snap => {
    if (snap.val()) {
      presRef.onDisconnect().set(false);
      presRef.set(true);
    }
  });

  document.getElementById('select-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  const gameHeader = document.getElementById('game-header');
  gameHeader.style.setProperty('--pc', p?.color || PLAYER_COLORS[parseInt(pid[1])-1]);
  document.getElementById('game-screen').style.setProperty('--pc', p?.color || PLAYER_COLORS[parseInt(pid[1])-1]);
  document.getElementById('gh-name').textContent = name;

  // Restore answer if any
  document.getElementById('answer-input').value = p?.answer || '';
  renderGameScreen();
}

async function leaveSlot() {
  if (mySlot) {
    await update(`session/players/${mySlot}`, { connected: false, connectedBy: null, answer: '' });
  }
  mySlot = null;
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('select-screen').classList.remove('hidden');
  renderSelectScreen();
}

// ─── Game Screen ─────────────────────────────────────────
function renderGameScreen() {
  if (!mySlot || !session) return;
  const p = session.players?.[mySlot];
  if (!p) return;

  // Update score + name
  document.getElementById('gh-score').textContent = (p.score || 0) + ' Pkt.';
  document.getElementById('gh-name').textContent = p.name || 'Spieler';

  renderQuestion();
  renderBuzzerState();
}

let lastMediaAction = null;
let lastMediaSyncTs = 0;

function renderQuestion() {
  const qDisp = document.getElementById('q-display');
  const q = session?.currentQuestion;
  const phase = session?.phase || 'lobby';
  const mediaRevealed = session?.mediaRevealed || false;

  if (!q || phase === 'lobby') { qDisp.style.display = 'none'; return; }
  qDisp.style.display = 'flex';

  const typeIcon = { text:'📝', image:'🖼️', audio:'🎵', video:'🎬', combo:'🎯' };

  let mediaHtml = '';
  if ((q.type === 'image' || q.type === 'combo') && q.imageUrl) {
    if (mediaRevealed) {
      mediaHtml = `<img src="${esc(q.imageUrl)}" class="q-image-player" alt="Frage">`;
    } else {
      mediaHtml = `<div style="background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--muted);font-size:0.85rem;">
        🖼️ Bild wird gleich aufgedeckt …
      </div>`;
    }
  }
  if (q.type === 'combo' && q.hint) {
    mediaHtml += `<div style="font-size:0.78rem;color:var(--muted);text-align:center;">${esc(q.hint)}</div>`;
  }
  if (q.type === 'audio' && q.audioUrl) {
    mediaHtml = `<div style="background:var(--surface2);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;">
      <span style="font-size:1.6rem;">🎵</span>
      <audio id="player-audio" src="${esc(q.audioUrl)}" style="flex:1;height:36px;" class="q-media-player"></audio>
    </div>`;
  }
  if (q.type === 'video' && q.videoUrl) {
    if (mediaRevealed) {
      const ytMatch = q.videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      mediaHtml = ytMatch
        ? `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" width="100%" height="160"
            frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>`
        : `<video class="q-media-player" src="${esc(q.videoUrl)}" style="width:100%;border-radius:8px;"></video>`;
    } else {
      mediaHtml = `<div style="background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--muted);font-size:0.85rem;">
        🎬 Video wird gleich freigegeben …
      </div>`;
    }
  }

  const revealHtml = (phase === 'reveal')
    ? `<div class="q-reveal-box">✅ Antwort: ${esc(q.answer || '–')}</div>` : '';

  // Reveal medium – host controlled
  // Read revealType/revealUrl from session.currentQuestion (set when host loads question)
  const revealType = q.revealType || '';
  const revealUrl  = q.revealUrl  || '';
  const revealMediaRevealed = session?.revealMediaRevealed || false;

  // Debug bar – always visible, shows live state
  const dbg = document.getElementById('debug-bar');
  if (dbg) {
    dbg.style.display = 'block';
    dbg.textContent = 'phase:' + phase
      + ' | revealType:' + (revealType||'–')
      + ' | revealUrl:' + (revealUrl ? revealUrl.slice(0,30)+'…' : '–')
      + ' | revealMediaRevealed:' + revealMediaRevealed;
  }


  let revealMediaHtml = '';
  if (revealType && revealUrl) {
    if (revealMediaRevealed) {
      if (revealType === 'image') {
        revealMediaHtml = '<img src="' + esc(revealUrl) + '" class="q-image-player" alt="Auflösung" title="✅ Auflösung">';
      } else if (revealType === 'audio') {
        revealMediaHtml = '<div style="margin-top:8px;background:var(--surface2);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;">'
          + '<span style="font-size:1.4rem;">🎵</span>'
          + '<audio id="reveal-audio-player" src="' + esc(revealUrl) + '" style="flex:1;height:36px;" class="q-media-player"></audio>'
          + '</div>';
      } else if (revealType === 'video') {
        const ytMatch = revealUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        revealMediaHtml = ytMatch
            ? '<iframe src="https://www.youtube.com/embed/' + ytMatch[1] + '" width="100%" height="200" frameborder="0" allowfullscreen style="border-radius:8px;display:block;margin-top:8px;"></iframe>'
            : '<video src="' + esc(revealUrl) + '" controls style="width:100%;border-radius:8px;margin-top:8px;"></video>';
      }
    } else {
      const revealIcons = { image:'🖼️', audio:'🎵', video:'🎬' };
      const revealIcon = revealIcons[revealType] || '📎';
      revealMediaHtml = '<div style="text-align:center;font-size:0.82rem;color:var(--muted);padding:10px;background:var(--surface2);border-radius:8px;margin-top:8px;">'
        + revealIcon + ' Auflösungs-Medium folgt gleich …'
        + '</div>';
    }
  }

  // Side-by-side if both question image AND reveal image are visible
  const hasQuestionImg = (q.type === 'image' || q.type === 'combo') && q.imageUrl;
  const hasRevealImg   = revealType === 'image' && revealMediaRevealed;
  const showSideBySide = hasQuestionImg && hasRevealImg;

  let combinedMedia;
  if (showSideBySide) {
    // Both images: full-width row, each takes 50%
    combinedMedia = '<div class="q-media-row">'
      + '<div class="q-media-col">'
      + '  <div class="q-media-label">❓ Frage</div>'
      + '  <img src="' + esc(q.imageUrl) + '" class="q-image-player" alt="Frage">'
      + '</div>'
      + '<div class="q-media-col">'
      + '  <div class="q-media-label">✅ Auflösung</div>'
      + '  <img src="' + esc(revealUrl) + '" class="q-image-player" alt="Auflösung">'
      + '</div>'
      + '</div>';
  } else {
    combinedMedia = mediaHtml + revealMediaHtml;
  }

  qDisp.innerHTML = `
    <div class="q-phase-hint">${typeIcon[q.type]||'📝'} ${phase === 'reveal' ? 'Auflösung' : 'Aktuelle Frage'}</div>
    <div class="q-text-player">${esc(q.question || '')}</div>
    ${combinedMedia}
    ${revealHtml}`;

  // Sync reveal audio from host
  const revealSyncTs = session?.revealMediaSyncTs || 0;
  const revealAction = session?.revealMediaAction || null;
  if (q.revealType === 'audio' && revealAction && revealSyncTs !== (window._lastRevealSyncTs||0)) {
    window._lastRevealSyncTs = revealSyncTs;
    setTimeout(() => {
      const ra = document.getElementById('reveal-audio-player');
      if (!ra) return;
      if (revealAction === 'play') { ra.currentTime = session?.revealMediaTime||0; ra.play().catch(()=>{}); }
      else if (revealAction === 'pause') ra.pause();
    }, 100);
  }

  // Sync audio - use setTimeout to let DOM update first
  const syncTs = session?.mediaSyncTs || 0;
  const action  = session?.mediaAction || null;
  if (q.type === 'audio' && action && syncTs !== lastMediaSyncTs) {
    lastMediaSyncTs = syncTs;
    setTimeout(() => {
      const audio = document.getElementById('player-audio');
      if (!audio) return;
      if (action === 'play') {
        audio.currentTime = session?.mediaTime || 0;
        audio.play().catch(e => console.log('Audio play failed:', e));
      } else if (action === 'pause') {
        audio.pause();
      } else if (action === 'seek') {
        audio.currentTime = session?.mediaTime || 0;
      }
    }, 100);
  }
}

function renderBuzzerState() {
  const btn = document.getElementById('buzz-btn');
  const status = document.getElementById('buzz-status');
  if (!session || !mySlot) return;

  const order = session.buzzer?.order || [];
  const myRank = order.indexOf(mySlot);
  const alreadyBuzzed = myRank >= 0;
  const locked = session.locked;

  const lockedPlayers = session?.lockedPlayers || [];
  const isPersonallyLocked = lockedPlayers.includes(mySlot);

  btn.classList.remove('locked','already');
  if (alreadyBuzzed) {
    btn.classList.add('already');
    if (myRank === 0) {
      status.textContent = '🏆 Erster Buzz! Du bist dran!';
      status.className = 'buzz-status active';
    } else {
      status.textContent = `Du hast gebuzzt – Rang #${myRank + 1}`;
      status.className = 'buzz-status';
    }
  } else if (isPersonallyLocked) {
    btn.classList.add('locked');
    status.textContent = '🚫 Du wurdest für diese Runde gesperrt.';
    status.className = 'buzz-status warn';
  } else if (locked) {
    btn.classList.add('locked');
    status.textContent = '🔒 Buzzer gesperrt – warte auf Host.';
    status.className = 'buzz-status warn';
  } else {
    status.textContent = 'Bereit – drücke den Buzzer!';
    status.className = 'buzz-status';
  }
}

// ─── Buzz ────────────────────────────────────────────────
async function doBuzz(e) {
  if (!session || !mySlot) return;
  const locked = session.locked;
  const order = session.buzzer?.order || [];
  const lockedPlayers = session.lockedPlayers || [];
  if (locked || order.includes(mySlot) || lockedPlayers.includes(mySlot)) return;

  // Ripple effect
  const btn = document.getElementById('buzz-btn');
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const d = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${d}px;height:${d}px;left:${(e.clientX||rect.left+rect.width/2)-rect.left-d/2}px;top:${(e.clientY||rect.top+rect.height/2)-rect.top-d/2}px;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
  btn.classList.add('fired');
  setTimeout(() => btn.classList.remove('fired'), 500);

  // Write to Firebase
  const newOrder = [...order, mySlot];
  await update('session', {
    'buzzer/order': newOrder,
    'buzzer/firstId': newOrder[0],
    locked: true,
  });
}

// ─── Answer ──────────────────────────────────────────────
let answerDebounce = null;
function submitAnswer(val) {
  clearTimeout(answerDebounce);
  answerDebounce = setTimeout(async () => {
    if (!mySlot) return;
    await update(`session/players/${mySlot}`, { answer: val });
  }, 400);
}
</script>
