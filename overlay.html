<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizBuzz – OBS Overlay</title>
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --p1:#f5a623; --p2:#4fc3f7; --p3:#66bb6a; --p4:#ef5350;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }

  .overlay {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 16px 20px;
    gap: 10px;
  }

  /* ── Question Card ── */
  .q-card {
    background: rgba(13,15,26,0.92);
    border: 1px solid rgba(91,110,245,0.3);
    border-radius: 12px; padding: 14px 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; gap: 8px;
    transform: translateY(0); opacity: 1;
    transition: opacity 0.4s, transform 0.4s;
  }
  .q-card.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }

  .q-card-top {
    display: flex; align-items: center; gap: 10px;
  }
  .q-type-chip {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
  }
  .type-text  { background: rgba(91,110,245,0.2); color: #8896ff; }
  .type-image { background: rgba(245,166,35,0.2); color: #f5a623; }
  .type-audio { background: rgba(102,187,106,0.2); color: #66bb6a; }
  .type-video { background: rgba(245,91,139,0.2); color: #f55b8b; }
  .type-combo { background: rgba(38,198,218,0.2); color: #26c6da; }

  .q-cat-label { font-size: 0.72rem; color: rgba(255,255,255,0.45); }
  .q-pts-label { margin-left: auto; font-size: 0.7rem; color: rgba(255,255,255,0.4); }

  .q-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.35rem; font-weight: 600; color: #e8eaf6; line-height: 1.3;
  }

  /* ── Buzz Notification ── */
  .buzz-notif {
    display: flex; align-items: center; gap: 14px;
    background: rgba(13,15,26,0.93);
    border: 2px solid var(--bc, #f5a623);
    border-radius: 12px; padding: 12px 18px;
    box-shadow: 0 0 30px -6px var(--bc, #f5a623), 0 4px 20px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    position: relative; overflow: hidden;
    transform: translateY(0); opacity: 1;
    transition: opacity 0.4s, transform 0.4s;
  }
  .buzz-notif.hidden { opacity: 0; transform: translateY(16px); pointer-events: none; }
  .buzz-notif::before { content:''; position:absolute; left:0;top:0;bottom:0;width:5px; background:var(--bc,#f5a623); }

  .bn-icon { font-size: 1.5rem; margin-left: 4px; }
  .bn-info { flex: 1; }
  .bn-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bc, #f5a623); }
  .bn-name  { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1.1; }
  .bn-answer { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
  .bn-rank  { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--bc,#f5a623); line-height: 1; }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex; gap: 8px;
  }
  .player-chip {
    flex: 1; min-width: 0;
    background: rgba(13,15,26,0.88);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; padding: 10px 12px;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.25s;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .player-chip::before {
    content: ''; position: absolute; left:0;top:0;bottom:0;width:4px;
    background: var(--pc);
  }
  .player-chip.buzzed { border-color: var(--pc); box-shadow: 0 0 18px -4px var(--pc), 0 2px 16px rgba(0,0,0,0.4); }
  .player-chip.first  { border-color: #ffd700; box-shadow: 0 0 28px -4px #ffd700, 0 2px 16px rgba(0,0,0,0.5); transform: scale(1.02); }
  .player-chip.offline { opacity: 0.35; }

  .pc-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 600; color: #e8eaf6;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .pc-answer {
    font-size: 0.7rem; color: rgba(255,255,255,0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .pc-score {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.7rem; font-weight: 700;
    color: var(--pc); line-height: 1; text-align: right;
    margin-top: 4px;
  }
  .pc-pts-label { font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: right; text-transform: uppercase; letter-spacing: 0.08em; }

  @keyframes scoreFlash { 0%{transform:scale(1.35)} 100%{transform:scale(1)} }
  .score-flash { animation: scoreFlash 0.35s ease; display: inline-block; }
</style>
</head>
<body>
<div class="overlay">

  <!-- Buzz notification -->
  <div class="buzz-notif hidden" id="buzz-notif">
    <div class="bn-icon">⚡</div>
    <div class="bn-info">
      <div class="bn-label">Erster Buzz!</div>
      <div class="bn-name" id="bn-name">–</div>
      <div class="bn-answer" id="bn-answer"></div>
    </div>
    <div class="bn-rank" id="bn-rank">#1</div>
  </div>

  <!-- Question card -->
  <div class="q-card hidden" id="q-card">
    <div class="q-card-top">
      <span class="q-type-chip" id="q-type-chip">📝 Text</span>
      <span class="q-cat-label" id="q-cat-label"></span>
      <span class="q-pts-label" id="q-pts-label"></span>
    </div>
    <div class="q-text" id="q-text"></div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard"></div>
</div>

<script>
initFirebase();

const COLORS = ['#f5a623','#4fc3f7','#66bb6a','#ef5350'];
const TYPE_ICON = { text:'📝', image:'🖼️', audio:'🎵', video:'🎬', combo:'🎯' };
const TYPE_LABEL = { text:'Text', image:'Bild', audio:'Sound', video:'Video', combo:'Bild+Text' };

let prevScores = {};

on('session', session => {
  if (!session) return;
  renderBuzzNotif(session);
  renderQuestionCard(session);
  renderScoreboard(session);
});

function renderBuzzNotif(s) {
  const el = document.getElementById('buzz-notif');
  const order = s.buzzer?.order || [];
  if (!order.length) { el.classList.add('hidden'); return; }

  const firstId = order[0];
  const p = s.players?.[firstId];
  const color = p?.color || '#f5a623';
  el.style.setProperty('--bc', color);
  document.getElementById('bn-name').textContent = p?.name || firstId;
  const ans = p?.answer;
  const ansEl = document.getElementById('bn-answer');
  ansEl.textContent = ans ? '💬 ' + ans : '';
  el.classList.remove('hidden');
}

function renderQuestionCard(s) {
  const el = document.getElementById('q-card');
  const q = s.currentQuestion;
  const phase = s.phase;
  if (!q || phase === 'lobby') { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');

  document.getElementById('q-type-chip').textContent = (TYPE_ICON[q.type]||'📝') + ' ' + (TYPE_LABEL[q.type]||'Text');
  document.getElementById('q-type-chip').className = 'q-type-chip type-' + (q.type||'text');
  document.getElementById('q-cat-label').textContent = '';  // cats not loaded in overlay
  document.getElementById('q-pts-label').textContent = (q.points||1) + ' Pkt.';
  document.getElementById('q-text').textContent = q.question || '';
}

function renderScoreboard(s) {
  const sb = document.getElementById('scoreboard');
  const players = s.players || {};
  const order = s.buzzer?.order || [];
  const firstId = order[0] || null;

  const pids = ['p1','p2','p3','p4'];

  sb.innerHTML = pids.map(pid => {
    const p = players[pid];
    if (!p) return '';
    const isBuzzed = order.includes(pid);
    const isFirst = pid === firstId;
    const scoreChanged = prevScores[pid] !== undefined && prevScores[pid] !== p.score;
    prevScores[pid] = p.score;

    return `<div class="player-chip ${isFirst?'first':isBuzzed?'buzzed':''} ${p.connected?'':'offline'}"
                 style="--pc:${esc(p.color||COLORS[parseInt(pid[1])-1])};">
      <div class="pc-name">${esc(p.name||pid)}</div>
      <div class="pc-answer">${esc(p.answer||'')}</div>
      <div class="pc-score"><span class="${scoreChanged?'score-flash':''}">${p.score||0}</span></div>
      <div class="pc-pts-label">Punkte</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
